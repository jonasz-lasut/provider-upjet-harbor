# Full end-to-end example that exercises every managed resource kind
# exposed by provider-upjet-harbor (namespaced API group) exactly once.
#
# Usage assumes a working ProviderConfig named "default" already exists
#
# Cross-resource references rely on the testing.upbound.io/example-name
# label, so the single Project/Group/User/Registry below act as the
# selector targets for downstream resources.

---
# -------------------------------------------------------------------
# Core building blocks referenced by downstream resources
# -------------------------------------------------------------------

apiVersion: harbor.m.crossplane.io/v1alpha1
kind: Group
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: storage-group
  namespace: crossplane-system
spec:
  forProvider:
    groupName: storage-group
    groupType: 2

---
apiVersion: v1
kind: Secret
metadata:
  name: user-secret
  namespace: crossplane-system
type: Opaque
stringData:
  password: "Password1"

---
apiVersion: harbor.m.crossplane.io/v1alpha1
kind: User
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: crossplane-system
spec:
  forProvider:
    email: john@smith.com
    fullName: John Smith
    username: testing1
    passwordSecretRef:
      key: password
      name: user-secret

---
apiVersion: harbor.m.crossplane.io/v1alpha1
kind: Registry
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: crossplane-system
spec:
  forProvider:
    endpointUrl: https://hub.docker.com
    name: test_docker_harbor
    providerName: docker-hub

---
apiVersion: harbor.m.crossplane.io/v1alpha1
kind: Label
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: crossplane-system
spec:
  forProvider:
    color: '#FF0000'
    description: Description to for acceptance test
    name: accTest

---
apiVersion: harbor.m.crossplane.io/v1alpha1
kind: Replication
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: push
  name: push
  namespace: crossplane-system
spec:
  forProvider:
    action: push
    name: test_push
    registryIdSelector:
      matchLabels:
        testing.upbound.io/example-name: main

---
apiVersion: harbor.m.crossplane.io/v1alpha1
kind: Tasks
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: crossplane-system
spec:
  forProvider:
    vulnerabilityScanPolicy: daily

---
# -------------------------------------------------------------------
# Harbor system configuration
# -------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: oidc-secret
  namespace: crossplane-system
type: Opaque
stringData:
  client-secret: "client-secret"

---
