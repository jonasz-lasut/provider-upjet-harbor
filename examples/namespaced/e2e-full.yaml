---
apiVersion: config.harbor.m.crossplane.io/v1alpha1
kind: Security
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: crossplane-system
spec:
  forProvider:
    cveAllowlist:
    - CVE-456
    - CVE-123
    expiresAt: 1701167767

---
apiVersion: config.harbor.m.crossplane.io/v1alpha1
kind: System
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: crossplane-system
spec:
  forProvider:
    notificationEnable: true
    projectCreationRestriction: adminonly
    robotNamePrefix: harbor@
    robotTokenExpiration: 30
    storagePerProject: 100

---
# -------------------------------------------------------------------
# Background jobs and scanning
# -------------------------------------------------------------------
apiVersion: garbage.harbor.m.crossplane.io/v1alpha1
kind: Collection
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: crossplane-system
spec:
  forProvider:
    deleteUntagged: true
    schedule: Daily
    workers: 1

---
apiVersion: purge.harbor.m.crossplane.io/v1alpha1
kind: AuditLog
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: crossplane-system
spec:
  forProvider:
    auditRetentionHour: 24
    includeOperations: create,pull
    includeEventTypes: pull_artifact
    schedule: Daily

---
apiVersion: interrogation.harbor.m.crossplane.io/v1alpha1
kind: Services
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: crossplane-system
spec:
  forProvider:
    defaultScanner: Clair
    vulnerabilityScanPolicy: Daily

---
apiVersion: preheat.harbor.m.crossplane.io/v1alpha1
kind: Instance
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: example
  namespace: crossplane-system
spec:
  forProvider:
    endpoint: http://example.com
    name: example-preheat-instance
    vendor: dragonfly

---
# -------------------------------------------------------------------
# Project-scoped policies and members
# -------------------------------------------------------------------
apiVersion: immutable.harbor.m.crossplane.io/v1alpha1
kind: TagRule
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: crossplane-system
spec:
  forProvider:
    disabled: true
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: main
    repoMatching: '**'
    tagMatching: v2.*

---
apiVersion: retention.harbor.m.crossplane.io/v1alpha1
kind: Policy
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: crossplane-system
spec:
  forProvider:
    rule:
    - nDaysSinceLastPull: 5
      repoMatching: '**'
      tagMatching: latest
    - nDaysSinceLastPush: 10
      repoMatching: '**'
      tagMatching: '{latest,snapshot}'
    schedule: Daily
    scopeSelector:
      matchLabels:
        testing.upbound.io/example-name: main

---
apiVersion: project.harbor.m.crossplane.io/v1alpha1
kind: MemberGroup
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: crossplane-system
spec:
  forProvider:
    groupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: main
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: main
    role: projectadmin
    type: internal

---
apiVersion: project.harbor.m.crossplane.io/v1alpha1
kind: MemberUser
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: crossplane-system
spec:
  forProvider:
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: main
    role: projectadmin
    userNameSelector:
      matchLabels:
        testing.upbound.io/example-name: main

---
apiVersion: project.harbor.m.crossplane.io/v1alpha1
kind: Webhook
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: crossplane-system
spec:
  forProvider:
    address: https://webhook.domain.com
    eventsTypes:
    - DELETE_ARTIFACT
    - PULL_ARTIFACT
    - PUSH_ARTIFACT
    - QUOTA_EXCEED
    - QUOTA_WARNING
    - REPLICATION
    - SCANNING_FAILED
    - SCANNING_COMPLETED
    - TAG_RETENTION
    name: test_webhook
    notifyType: http
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: main

---
apiVersion: robot.harbor.m.crossplane.io/v1alpha1
kind: Account
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: system
  name: system
  namespace: crossplane-system
spec:
  forProvider:
    description: system level robot account
    level: system
    name: example-system
    permissions:
    - access:
        - action: create
          resource: label
      kind: system
      namespace: "/"
    - access:
        - action: push
          resource: repository
        - action: pull
          resource: repository
      kind: project
      namespaceSelector:
        matchLabels:
          testing.upbound.io/example-name: main

---

apiVersion: harbor.m.crossplane.io/v1alpha1
kind: Project
metadata:
  annotations:
    meta.upbound.io/example-id: e2e-full
  labels:
    testing.upbound.io/example-name: main
  name: main
  namespace: crossplane-system
spec:
  forProvider:
    name: main
    autoSbomGeneration: true
    enableContentTrust: true
    enableContentTrustCosign: false
    public: false
    vulnerabilityScanner: Trivy
    vulnerabilityScanning: true
