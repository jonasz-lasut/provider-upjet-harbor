    meta.upbound.io/example-id: project/v1alpha1/membergroup
  labels:
    testing.upbound.io/example-name: main
  name: storage-group
spec:
  forProvider:
    groupName: storage-group
    groupType: 2

---

apiVersion: harbor.crossplane.io/v1alpha1
kind: Project
metadata:
  annotations:
    meta.upbound.io/example-id: project/v1alpha1/membergroup
  labels:
    testing.upbound.io/example-name: main
  name: main
spec:
  forProvider:
    name: main
