apiVersion: project.harbor.crossplane.io/v1alpha1
kind: MemberGroup
metadata:
  annotations:
    meta.upbound.io/example-id: project/v1alpha1/membergroup
  labels:
    testing.upbound.io/example-name: main
  name: main
spec:
  forProvider:
    groupNameSelector:
      matchLabels:
        testing.upbound.io/example-name: main
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: main
    role: projectadmin
    type: internal

---

apiVersion: harbor.crossplane.io/v1alpha1
