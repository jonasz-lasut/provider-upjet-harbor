apiVersion: retention.harbor.crossplane.io/v1alpha1
kind: Policy
metadata:
  annotations:
    meta.upbound.io/example-id: retention/v1alpha1/policy
  labels:
    testing.upbound.io/example-name: main
  name: main
spec:
  forProvider:
    rule:
    - nDaysSinceLastPull: 5
      repoMatching: '**'
      tagMatching: latest
    - nDaysSinceLastPush: 10
      repoMatching: '**'
      tagMatching: '{latest,snapshot}'
    schedule: Daily
    scopeSelector:
      matchLabels:
        testing.upbound.io/example-name: main

---

apiVersion: harbor.crossplane.io/v1alpha1
kind: Project
metadata:
  annotations:
    meta.upbound.io/example-id: retention/v1alpha1/policy
  labels:
    testing.upbound.io/example-name: main
  name: main
spec:
  forProvider:
    name: acctest
